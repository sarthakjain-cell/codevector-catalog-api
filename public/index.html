<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeVector Product Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-800">CodeVector Catalog</h1>
            <span class="text-sm text-gray-500 bg-gray-200 px-3 py-1 rounded-full">Cursor Pagination Active</span>
        </div>
        
        <div class="flex gap-4 mb-6 items-center">
            <label class="font-semibold text-gray-700">Filter:</label>
            <select id="categoryFilter" class="border border-gray-300 p-2 rounded shadow-sm w-48 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="resetAndLoad()">
                <option value="All">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Books">Books</option>
                <option value="Home">Home</option>
                <option value="Sports">Sports</option>
                <option value="Toys">Toys</option>
            </select>
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
            <!-- Products will be injected here -->
        </div>

        <div class="flex justify-center mt-8">
            <button id="loadMoreBtn" onclick="loadMore()" class="bg-blue-600 text-white px-8 py-3 rounded-lg shadow hover:bg-blue-700 transition hidden font-semibold">
                Load More Products
            </button>
            <p id="loadingText" class="text-gray-500 hidden animate-pulse font-medium">Fetching from database...</p>
        </div>
    </div>

    <script>
        let currentCursor = null;

        async function loadProducts(cursor = null, isReset = false) {
            const category = document.getElementById('categoryFilter').value;
            const btn = document.getElementById('loadMoreBtn');
            const loading = document.getElementById('loadingText');
            
            btn.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                let url = `/api/products?limit=20`;
                if (category !== 'All') url += `&category=${category}`;
                if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;

                const response = await fetch(url);
                const data = await response.json();
                
                currentCursor = data.nextCursor;

                const grid = document.getElementById('productGrid');
                if (isReset) grid.innerHTML = '';

                data.data.forEach(product => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-5 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition';
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-gray-800 leading-tight">${product.name}</h3>
                            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">${product.category}</span>
                        </div>
                        <p class="text-green-600 font-extrabold text-xl mb-3">$${product.price.toFixed(2)}</p>
                        <div class="border-t pt-2 mt-2">
                            <p class="text-[10px] text-gray-400 font-mono" title="Cursor Timestamp">Updated: ${new Date(product.updated_at).toLocaleString()}</p>
                            <p class="text-[10px] text-gray-400 font-mono truncate" title="UUID">ID: ${product.id.split('-')[0]}...</p>
                        </div>
                    `;
                    grid.appendChild(div);
                });

                if (currentCursor) {
                    btn.classList.remove('hidden');
                } else {
                    const msg = document.createElement('p');
                    msg.className = "text-gray-500 text-center col-span-full py-8 italic";
                    msg.textContent = "You've reached the end of the catalog.";
                    grid.appendChild(msg);
                }
            } catch (err) {
                console.error("Failed to load products", err);
            } finally {
                loading.classList.add('hidden');
            }
        }

        function loadMore() {
            if (currentCursor) loadProducts(currentCursor, false);
        }

        function resetAndLoad() {
            currentCursor = null;
            loadProducts(null, true);
        }

        // Initial load
        resetAndLoad();
    </script>
</body>
</html>
